spring:
  application:
    name: order-orchestrator
  datasource:
    url: jdbc:postgresql://${ORDER_DB_HOST:localhost}:${ORDER_DB_PORT:5431}/order_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

grpc:
  server:
    port: 9090

services:
  order:
    host: ${ORDER_SERVICE_HOST:localhost}
    port: ${ORDER_SERVICE_PORT:9091}
  kitchen:
    host: ${KITCHEN_SERVICE_HOST:localhost}
    port: ${KITCHEN_SERVICE_PORT:9092}
  accounting:
    host: ${ACCOUNTING_SERVICE_HOST:localhost}
    port: ${ACCOUNTING_SERVICE_PORT:9093}
