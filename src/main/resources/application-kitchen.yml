spring:
  application:
    name: kitchen-service
  datasource:
    url: jdbc:postgresql://${KITCHEN_DB_HOST:localhost}:${KITCHEN_DB_PORT:5432}/kitchen_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

grpc:
  server:
    port: 9092

