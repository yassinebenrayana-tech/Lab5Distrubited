spring:
  application:
    name: accounting-service
  datasource:
    url: jdbc:postgresql://${ACCOUNTING_DB_HOST:localhost}:${ACCOUNTING_DB_PORT:5433}/accounting_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083

grpc:
  server:
    port: 9093

